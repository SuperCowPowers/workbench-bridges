[tox]
requires = tox>=4.24.0
env_list = lint, py310, py311, py312, py313
labels =
    quick = py313
    full = lint, py310, py311, py312, py313

[testenv]
description = Run unit tests
basepython = python3.12
passenv = AWS_PROFILE
deps =
    pytest
    pytest-sugar
    coverage
    pytest-cov
    .[all]
commands = pytest --assert=plain -x {posargs:tests}

[testenv:verbose]
description = Run tests with verbose logging
deps = {[testenv]deps}
commands = pytest --assert=plain -x -s {posargs:tests}

[testenv:py310]
description = Run tests with Python 3.10
basepython = python3.10
deps = {[testenv]deps}

[testenv:py311]
description = Run tests with Python 3.11
basepython = python3.11
deps = {[testenv]deps}

[testenv:py312]
description = Run tests with Python 3.12
basepython = python3.12
deps = {[testenv]deps}

[testenv:py313]
description = Run tests with Python 3.13
basepython = python3.13
deps = {[testenv]deps}

[testenv:lint]
description = Run linters
skip_install = true
deps =
    black>=22.12
    flake8
commands =
    black --line-length=120 {posargs:.}
    flake8 --exclude '*generated*' src/workbench_bridges applications tests

[testenv:format]
description = Run formatters
skip_install = true
deps = black>=22.12
commands = black --line-length=120 {posargs:.}
